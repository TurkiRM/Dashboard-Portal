<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تركي رزيق | مبرمج ومحلل بيانات</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        :root {
            --excellence-green: #1F8A4C;
            --progress-blue: #3D69B1;
            --launch-orange: #F49D42;
            --bg-light: #F4F7F9;
            --text-dark: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            border-top: 10px solid var(--progress-blue);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #EEE;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        .profile-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--progress-blue);
            margin-bottom: 15px;
            object-fit: cover;
            background: #fff;
        }

        h1 { margin: 10px 0; font-size: 26px; color: var(--progress-blue); }
        
        .credentials { 
            color: #555; 
            font-size: 15px; 
            line-height: 1.8; 
            margin-bottom: 10px; 
        }

        .license-container { margin: 15px 0; }

        .license { 
            background: #E8F0FE; 
            color: var(--progress-blue); 
            padding: 6px 14px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-weight: bold;
            display: inline-block;
            margin: 5px;
            border: 1px solid #D0E1FD;
        }

        .form-group { margin-bottom: 25px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.95em; }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E0E0E0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background: #FCFCFC;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--progress-blue); outline: none; background: #fff; }

        .submit-btn {
            background: #25D366; /* WhatsApp Green */
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-size: 19px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        .submit-btn:hover { background: #1da851; transform: translateY(-3px); }

        .social-footer {
            margin-top: 40px;
            text-align: center;
            padding-top: 25px;
            border-top: 1px solid #EEE;
        }
        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .social-links a {
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            padding: 8px 10px;
            border-radius: 8px;
            background: #f8f9fa;
            border: 1px solid #eee;
        }
        
        .yt { color: #FF0000; }
        .x-tw { color: #000000; }
        .ig { color: #E1306C; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpeg" alt="Logo" class="profile-logo" onerror="this.src='https://via.placeholder.com/110?text=LOGO'">
        <h1>تركي رزيق</h1>
        <div class="credentials">
            مبرمج ومحلل بيانات معتمد من وزارة الموارد البشرية
            <div class="license-container">
                <span class="license">FL-14032327 💻</span>
                <span class="license">FL-531730147 📊</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>الاسم بالكامل</label>
        <input type="text" id="clientName" placeholder="أدخل اسمك الكريم">
    </div>

    <div class="form-group">
        <label>شرح متطلبات المشروع</label>
        <textarea id="requirements" rows="4" placeholder="اكتب هنا الأهداف والنتائج المطلوبة..."></textarea>
    </div>

    <div class="form-group">
        <label>تاريخ التسليم المطلوب (Deadline)</label>
        <input type="date" id="deadline">
    </div>

    <button type="button" onclick="sendToWhatsApp()" class="submit-btn">
        <span>إرسال التفاصيل عبر واتساب</span>
        <span>💬</span>
    </button>

    <div class="social-footer">
        <p style="font-size: 13px; color: #888; margin-bottom: 5px;">تواصل معي عبر المنصات التالية</p>
        <div class="social-links">
            <a href="https://youtube.com/@turkialhujili" class="yt">YouTube</a>
            <a href="https://x.com/AlhujiliTurki" class="x-tw">𝕏</a>
            <a href="https://www.tiktok.com/@turki.alhujili" class="tk">TikTok</a>
            <a href="https://www.instagram.com/turkialhujili" class="ig">Instagram</a>
            <a href="https://www.snapchat.com/add/turki_alhujili" class="sc">Snapchat</a>
        </div>
    </div>
</div>

<script>
    function sendToWhatsApp() {
        const name = document.getElementById('clientName').value;
        const req = document.getElementById('requirements').value;
        const date = document.getElementById('deadline').value;
        const phone = "966543116571";

        if (!name || !req) {
            alert("يرجى ملء الاسم والمتطلبات أولاً");
            return;
        }

        // Creating the encoded message
        const message = `مرحباً أستاذ تركي،%0A%0A` +
                        `*الاسم:* ${name}%0A` +
                        `*المتطلبات:* ${req}%0A` +
                        `*تاريخ التسليم:* ${date}%0A%0A` +
                        `أود تزويدك بالملفات المطلوبة لبدء التحليل.`;

        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
