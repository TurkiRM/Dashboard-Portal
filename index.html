<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تركي رزيق | مبرمج ومحلل بيانات</title>
    <style>
        :root {
            --excellence-green: #1F8A4C;
            --progress-blue: #3D69B1;
            --launch-orange: #F49D42;
            --bg-light: #F4F7F9;
            --text-dark: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            max-width: 550px;
            width: 100%;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            border-top: 10px solid var(--progress-blue);
        }

        .header { text-align: center; border-bottom: 1px solid #EEE; padding-bottom: 20px; margin-bottom: 25px; }
        .profile-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--progress-blue); margin-bottom: 10px; }
        h1 { margin: 5px 0; font-size: 24px; color: var(--progress-blue); }
        
        .license { 
            background: #E8F0FE; color: var(--progress-blue); padding: 4px 10px; 
            border-radius: 6px; font-family: monospace; font-weight: bold; font-size: 13px;
        }

        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        
        input, textarea {
            width: 100%; padding: 12px; border: 1.5px solid #E0E0E0;
            border-radius: 10px; box-sizing: border-box; font-size: 16px;
        }

        .price-box {
            background: #FFF9F2;
            border: 1px dashed var(--launch-orange);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        .price-amount {
            display: block;
            font-size: 28px;
            font-weight: bold;
            color: var(--excellence-green);
        }

        .submit-btn {
            background: #25D366; color: white; border: none; padding: 16px;
            width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn:hover { background: #1da851; transform: translateY(-2px); }

        .note { font-size: 12px; color: #777; line-height: 1.5; margin-top: 5px; }

        .social-links { display: flex; justify-content: center; gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .social-links a { text-decoration: none; font-size: 12px; color: #666; padding: 5px 8px; border: 1px solid #eee; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpeg" alt="Logo" class="profile-logo" onerror="this.src='https://via.placeholder.com/100'">
        <h1>تركي رزيق</h1>
        <p style="font-size: 14px; color: #666;">مبرمج ومحلل بيانات معتمد</p>
        <span class="license">FL-14032327 💻</span>
        <span class="license">📊FL-531730147 </span>
    </div>

    <div class="form-group">
        <label>الاسم بالكامل</label>
        <input type="text" id="clientName" placeholder="أدخل اسمك الكريم">
    </div>

    <div class="form-group">
        <label>عدد ملفات الإكسل (Files)</label>
        <input type="number" id="fileCount" value="1" min="1" oninput="calculatePrice()">
    </div>

    <div class="form-group">
        <label>إجمالي عدد الأعمدة في جميع الملفات (Total Columns)</label>
        <input type="number" id="columnCount" value="5" min="1" oninput="calculatePrice()">
        <div class="note">
            * السعر 200 ريال لكل ملف (حتى 10 أعمدة).<br>
            * كل عمود إضافي يتجاوز الحد المسموح يكلف 20 ريال.
        </div>
    </div>

    <div class="price-box">
        <span style="font-size: 14px; color: #555;">التكلفة التقديرية</span>
        <span class="price-amount"><span id="totalPrice">200</span> ريال</span>
    </div>

    <div class="form-group">
        <label>شرح إضافي للمشروع</label>
        <textarea id="requirements" rows="3" placeholder="اكتب هنا الأهداف المطلوبة..."></textarea>
    </div>

    <button type="button" onclick="sendToWhatsApp()" class="submit-btn">
        إرسال التفاصيل والسعر عبر واتساب 💬
    </button>

    <div class="social-footer">
        <p style="font-size: 13px; color: #888; margin-bottom: 5px;">تواصل معي عبر المنصات التالية</p>
        <div class="social-links">
            <a href="https://youtube.com/@turkialhujili" class="yt">YouTube</a>
            <a href="https://x.com/AlhujiliTurki" class="x-tw">𝕏</a>
            <a href="https://www.tiktok.com/@turki.alhujili" class="tk">TikTok</a>
            <a href="https://www.instagram.com/turkialhujili" class="ig">Instagram</a>
            <a href="https://www.snapchat.com/add/turki_alhujili" class="sc">Snapchat</a>
        </div>
    </div>
</div>
</div>

<script>
    function calculatePrice() {
        const fileCount = parseInt(document.getElementById('fileCount').value) || 0;
        const totalColumns = parseInt(document.getElementById('columnCount').value) || 0;
        
        const basePricePerFile = 200;
        const allowedColumns = fileCount * 10;
        
        // Initial cost based on number of files
        let total = fileCount * basePricePerFile;

        // Add 20 SAR for every column that exceeds the allowed limit (5 per file)
        if (totalColumns > allowedColumns) {
            total += (totalColumns - allowedColumns) * 20;
        }

        document.getElementById('totalPrice').innerText = total;
        return total;
    }

    function sendToWhatsApp() {
        const name = document.getElementById('clientName').value;
        const files = document.getElementById('fileCount').value;
        const cols = document.getElementById('columnCount').value;
        const price = document.getElementById('totalPrice').innerText;
        const req = document.getElementById('requirements').value;
        const phone = "966543116571";

        if (!name) {
            alert("يرجى إدخال الاسم");
            return;
        }

        const message = `*طلب تحليل بيانات*%0A%0A` +
                        `*الاسم:* ${name}%0A` +
                        `*عدد الملفات:* ${files}%0A` +
                        `*إجمالي الأعمدة:* ${cols}%0A` +
                        `*السعر التقديري:* ${price} ريال%0A%0A` +
                        `*التفاصيل:* ${req || 'لا يوجد تفاصيل إضافية'}`;

        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
